# =========================================================
# FragDockRL configuration file
# All parameters controlling RL training, docking, and search
# =========================================================

run:
  start_smi: "NCc1ccncc1"        # Starting molecule (SMILES) used as the initial state
  num_sub_proc: 32               # Number of subprocesses used for parallel docking / evaluation
  ep_dir: "ep"                   # Directory where generated episode data are stored
  save_dir: "save"               # Directory where trained models and checkpoints are saved
  device: "auto"                 # Compute device: auto / cpu / cuda / cuda:0
  core_pdb_file: "mol_ref_core.pdb"  # Reference core structure used for tethered docking
  log_file: "run_log.txt"        # Output log file
  max_epoch: 1                   # Number of outer RL cycles (episode generation + training)

data:
  data_dir: "../data"            # Base directory containing input data files
  building_block_file: "bb_reaction.pkl"  # Building block and reaction mapping data
  reaction_file: "smirks_reactant.pkl"    # Reaction definitions (SMIRKS)
  m_bb_file: "m_bb.pkl"          # Precomputed building block metadata
  bb_fp_pkl: "bb_fp_r2_1024.pkl" # Building block fingerprints (used as features)

search:
  penalty_score: -2.0            # Score penalty applied when constraints are violated
  max_step: 3                    # Number of sequential assembly steps (tree depth)
  num_expand: 6666               # Max number of successful BB expansions per node (docking budget per node)
  beam_width: 10                 # Number of top molecules kept at each step

docking:
  tdock: "rdock"                 # Docking engine (rdock or smina)
  dock_dir: "dock"               # directory to store final docking result files (PDB)
  tmp_dir: "tmp"                 # directory for temporary files generated during docking
  keep_tmp: false                # if true, keep temporary files for debugging; if false, delete them after docking
  rdock_run: "rbdock"            # rDock executable name
  rdock_prm: "dock.prm" # rDock docking parameter file
  rdock_receptor_prm: "receptor.prm" # rDock receptor parameter file
  rdock_nconf: 10                # Number of docking poses generated by rDock
  smina_run: "smina"             # smina executable name
  smina_config_file: "config.txt" # Configuration file for smina docking
  prepare_ligand_run: "prepare_ligand4" # Ligand preparation tool
  timeout_docking: 120           # Maximum docking runtime per molecule (seconds)

cutoff:
  num_rb: 12                     # Maximum allowed number of rotatable bonds
  num_heavy_atoms: 60            # Maximum allowed number of heavy atoms
  mol_wt: 650                    # Maximum allowed molecular weight
  timeout_docking: 120           # Docking timeout used as a safety cutoff
  cut_score: 3                   # Docking score cutoff threshold
  cut_rmsd: 0.5                  # RMSD cutoff for pose filtering

penalty:
  w_logp: 0.0                    # Weight of logP penalty
  w_mw: 0.0                      # Weight of molecular weight penalty
  w_ha: 0.0                      # Weight of heavy atom count penalty
  w_hd: 0.0                      # Weight of hydrogen donor penalty
